services:
  mindbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: mindbox:latest
    container_name: mindbox
    ports:
      - "8080:8080"
      - "6006:6006"
    env_file:
      - .env
    environment:
      MINDBOX_KERNEL: ${MINDBOX_KERNEL:-claude-code}
      MINDBOX_DATA_ROOT: /mindbox
      MINDBOX_PORT: "8080"
    # gpus: all
    volumes:
      - ./mindbox-skills:/home/mindbox/.claude/skills:ro
      - ./data/datasets:/mindbox/datasets:ro
      - ./data/models:/mindbox/models:ro
      - ./data/mindbox/tasks:/mindbox/tasks
      - ./data/.claude:/home/mindbox/.claude
      - ./data/.cache:/home/mindbox/.cache
